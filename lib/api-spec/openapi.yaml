openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AURA Forge API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: projects
    description: Contract project operations
  - name: forge
    description: AI contract generation and compilation
  - name: teams
    description: Team workspaces, membership, and invites
  - name: api-keys
    description: Public API keys for programmatic access
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid input or email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in to an existing account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out of the current session
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List the current user's forged contract projects
      parameters:
        - name: teamId
          in: query
          required: false
          description: Scope to a team workspace instead of the caller's personal projects. Caller must be a member.
          schema:
            type: integer
      responses:
        "200":
          description: List of contract projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContractProjectSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/summary:
    get:
      operationId: getProjectsSummary
      tags: [projects]
      summary: Aggregate stats across the current user's contract projects
      parameters:
        - name: teamId
          in: query
          required: false
          description: Scope to a team workspace instead of the caller's personal projects. Caller must be a member.
          schema:
            type: integer
      responses:
        "200":
          description: Aggregate summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectsSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single contract project with full source and artifacts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contract project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractProject"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a contract project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/lineage:
    get:
      operationId: getProjectLineage
      tags: [projects]
      summary: Get the full version lineage (ancestors + descendants) containing this project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Version chain, oldest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectLineageEntry"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/deploy:
    patch:
      operationId: recordDeployment
      tags: [projects]
      summary: Record a live testnet deployment for a contract project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeploymentInput"
      responses:
        "200":
          description: Updated contract project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractProject"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/monitoring:
    patch:
      operationId: updateMonitoringConfig
      tags: [projects]
      summary: Turn post-deploy activity monitoring on/off and configure alert delivery
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonitoringConfigInput"
      responses:
        "200":
          description: Updated contract project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractProject"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List teams the current user belongs to
      responses:
        "200":
          description: Teams with the caller's role on each
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMembershipSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a new team (caller becomes owner)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamInput"
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMembershipSummary"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /teams/{id}/members:
    get:
      operationId: listTeamMembers
      tags: [teams]
      summary: List a team's members
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not a member of this team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /teams/{id}/members/{userId}:
    delete:
      operationId: removeTeamMember
      tags: [teams]
      summary: Remove a member from a team (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Only the team owner can remove members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /teams/{id}/invites:
    post:
      operationId: createTeamInvite
      tags: [teams]
      summary: Invite a user to a team by email (owner only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamInviteInput"
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamInvite"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Only the team owner can invite members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invites:
    get:
      operationId: listMyInvites
      tags: [teams]
      summary: List pending invites addressed to the current user's email
      responses:
        "200":
          description: Pending invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamInvite"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invites/{id}/accept:
    post:
      operationId: acceptTeamInvite
      tags: [teams]
      summary: Accept a pending team invite addressed to the current user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invite accepted, membership created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMembershipSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invite not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /invites/{id}/decline:
    post:
      operationId: declineTeamInvite
      tags: [teams]
      summary: Decline a pending team invite addressed to the current user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Invite declined
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Invite not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api-keys:
    get:
      operationId: listApiKeys
      tags: [api-keys]
      summary: List the current user's API keys (masked — full secret is never returned again)
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKeySummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createApiKey
      tags: [api-keys]
      summary: Create a new API key. The full secret is returned once and never shown again.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyInput"
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api-keys/{id}:
    delete:
      operationId: revokeApiKey
      tags: [api-keys]
      summary: Revoke an API key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Revoked
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /forge-contract:
    post:
      operationId: createForgeJob
      tags: [forge]
      summary: Start a new AI contract forge job (creates a pending project row)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgeContractInput"
      responses:
        "201":
          description: Forge job created, pending generation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractProject"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/harden:
    post:
      operationId: createHardenJob
      tags: [forge]
      summary: Start a new on-demand security-hardening re-run of an existing successful project (creates a new linked child project row)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HardenJobInput"
      responses:
        "201":
          description: Hardening job created, pending re-audit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractProject"
        "400":
          description: Source project is not eligible for hardening (must have completed successfully)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/harden-stream:
    get:
      operationId: streamHardenJob
      tags: [forge]
      summary: Server-sent events stream of a hardening job's progress (id refers to the child project created by POST /projects/{id}/harden)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: text/event-stream of forge phase events
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    AuthCredentials:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
          minLength: 8

    User:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        createdAt:
          type: string
          format: date-time

    Ecosystem:
      type: string
      enum: [EVM, SOLANA]

    ForgeStatus:
      type: string
      enum: [pending, generating, compiling, healing, hardening, success, failed]

    ForgeContractInput:
      type: object
      required: [prompt, contractName, ecosystem]
      properties:
        prompt:
          type: string
          minLength: 3
        contractName:
          type: string
          minLength: 1
        ecosystem:
          $ref: "#/components/schemas/Ecosystem"
        templateId:
          type: string
          description: Built-in starter template id (see the template catalog), or omit for a blank prompt.
        upgradeable:
          type: boolean
          description: EVM only — generate an upgradeable (proxy/UUPS) contract pattern.
        teamId:
          type: integer
          description: Create this project under a team workspace instead of the caller's personal account. Caller must be a member of the team.

    DeploymentInput:
      type: object
      required: [networkSelected, deploymentTxHash, liveDeployedAddress]
      properties:
        networkSelected:
          type: string
        deploymentTxHash:
          type: string
        liveDeployedAddress:
          type: string

    CreateApiKeyInput:
      type: object
      required: [label]
      properties:
        label:
          type: string
          minLength: 1

    ApiKeySummary:
      type: object
      required: [id, label, keyPrefix, createdAt, lastUsedAt, revokedAt]
      properties:
        id:
          type: integer
        label:
          type: string
        keyPrefix:
          type: string
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: ["string", "null"]
          format: date-time
        revokedAt:
          type: ["string", "null"]
          format: date-time

    CreateApiKeyResult:
      type: object
      required: [id, label, keyPrefix, fullKey, createdAt]
      properties:
        id:
          type: integer
        label:
          type: string
        keyPrefix:
          type: string
        fullKey:
          type: string
          description: The full secret key — shown only in this response, never again.
        createdAt:
          type: string
          format: date-time

    CreateTeamInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    TeamMembershipSummary:
      type: object
      required: [id, name, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [owner, member]
        createdAt:
          type: string
          format: date-time

    TeamMember:
      type: object
      required: [userId, email, role]
      properties:
        userId:
          type: integer
        email:
          type: string
        role:
          type: string
          enum: [owner, member]

    CreateTeamInviteInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
        role:
          type: string
          enum: [owner, member]

    TeamInvite:
      type: object
      required: [id, teamId, teamName, email, role, status, createdAt]
      properties:
        id:
          type: integer
        teamId:
          type: integer
        teamName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [owner, member]
        status:
          type: string
          enum: [pending, accepted, declined]
        createdAt:
          type: string
          format: date-time

    MonitoringConfigInput:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
        webhookUrl:
          type: ["string", "null"]
          description: Webhook URL to POST alerts to; required when enabling monitoring with webhook delivery.
        emailAlertsEnabled:
          type: boolean

    ContractProjectSummary:
      type: object
      required:
        - id
        - contractName
        - ecosystem
        - status
        - securityScore
        - networkSelected
        - deploymentTxHash
        - liveDeployedAddress
        - teamId
        - createdAt
        - parentProjectId
        - templateId
        - upgradeable
      properties:
        id:
          type: integer
        teamId:
          type: ["integer", "null"]
        contractName:
          type: string
        ecosystem:
          $ref: "#/components/schemas/Ecosystem"
        status:
          $ref: "#/components/schemas/ForgeStatus"
        templateId:
          type: ["string", "null"]
        upgradeable:
          type: boolean
        securityScore:
          type: ["integer", "null"]
        parentProjectId:
          type: ["integer", "null"]
          description: Set when this project is an "Improve Security" re-run of another project
        networkSelected:
          type: ["string", "null"]
        deploymentTxHash:
          type: ["string", "null"]
        liveDeployedAddress:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    HardenJobInput:
      type: object
      properties:
        context:
          type: string
          description: Optional additional business/context info from the user, used to seed the hardening prompt when the auditor flagged that more context would improve its recommendation.

    ContractProject:
      type: object
      required:
        - id
        - userId
        - prompt
        - contractName
        - ecosystem
        - status
        - smartContractCode
        - compiledBytecode
        - abiOrIdl
        - securityScore
        - securityNotes
        - securityContextQuestion
        - userContext
        - compileLog
        - testSuiteCode
        - gasEstimates
        - gasNotes
        - networkSelected
        - deploymentTxHash
        - liveDeployedAddress
        - verificationStatus
        - verificationUrl
        - verificationError
        - monitoringEnabled
        - monitoringWebhookUrl
        - monitoringEmailAlertsEnabled
        - monitoringLastCheckedAt
        - monitoringLastAlertAt
        - teamId
        - createdAt
        - parentProjectId
        - templateId
        - upgradeable
      properties:
        id:
          type: integer
        userId:
          type: integer
        teamId:
          type: ["integer", "null"]
          description: Set when this project belongs to a team workspace instead of the creator's personal account.
        prompt:
          type: string
        contractName:
          type: string
        ecosystem:
          $ref: "#/components/schemas/Ecosystem"
        status:
          $ref: "#/components/schemas/ForgeStatus"
        templateId:
          type: ["string", "null"]
        upgradeable:
          type: boolean
        parentProjectId:
          type: ["integer", "null"]
          description: Set when this project is an "Improve Security" re-run of another project
        smartContractCode:
          type: ["string", "null"]
        compiledBytecode:
          type: ["string", "null"]
        abiOrIdl:
          type: ["string", "null"]
          description: JSON-serialized ABI (EVM) or IDL (Solana)
        securityScore:
          type: ["integer", "null"]
        securityNotes:
          type: ["string", "null"]
        securityContextQuestion:
          type: ["string", "null"]
          description: Set when the auditor determined a specific piece of business/context info would let it improve the score further; cleared once addressed or the target score is reached.
        userContext:
          type: ["string", "null"]
          description: Additional context the user supplied for this project's hardening pass.
        testSuiteCode:
          type: ["string", "null"]
          description: Auto-generated test suite source matching the latest contract version (Foundry-style for EVM, Anchor/TS for Solana), or null if generation hasn't run or failed.
        gasEstimates:
          type: ["string", "null"]
          description: JSON-serialized array of {functionSignature, gas} from solc (EVM only). Null for Solana or if unavailable.
        gasNotes:
          type: ["string", "null"]
          description: LLM-authored gas/efficiency notes — grounded in real solc estimates for EVM, or a clearly-labeled estimate for Solana.
        compileLog:
          type: ["string", "null"]
        networkSelected:
          type: ["string", "null"]
        deploymentTxHash:
          type: ["string", "null"]
        liveDeployedAddress:
          type: ["string", "null"]
        verificationStatus:
          type: ["string", "null"]
          description: "EVM-only source verification status after a deploy: pending|verified|failed, or null before any deploy."
        verificationUrl:
          type: ["string", "null"]
          description: Link to the verified-source page once verification succeeds.
        verificationError:
          type: ["string", "null"]
          description: Human-readable reason when verification fails.
        monitoringEnabled:
          type: boolean
          description: Whether post-deploy activity monitoring is turned on for this project (EVM only).
        monitoringWebhookUrl:
          type: ["string", "null"]
          description: Webhook URL to POST alerts to when new on-chain activity is detected.
        monitoringEmailAlertsEnabled:
          type: boolean
          description: Whether the user has opted into email alerts in addition to (or instead of) the webhook.
        monitoringLastCheckedAt:
          type: ["string", "null"]
          format: date-time
        monitoringLastAlertAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    ProjectLineageEntry:
      type: object
      required:
        - id
        - contractName
        - status
        - securityScore
        - securityNotes
        - securityContextQuestion
        - userContext
        - smartContractCode
        - parentProjectId
        - createdAt
      properties:
        id:
          type: integer
        contractName:
          type: string
        status:
          $ref: "#/components/schemas/ForgeStatus"
        securityScore:
          type: ["integer", "null"]
        securityNotes:
          type: ["string", "null"]
        securityContextQuestion:
          type: ["string", "null"]
        userContext:
          type: ["string", "null"]
          description: The context the user supplied that led to this version (if this version was a context-guided hardening re-run).
        smartContractCode:
          type: ["string", "null"]
        parentProjectId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    ProjectsSummary:
      type: object
      required:
        [totalProjects, evmCount, solanaCount, deployedCount, averageSecurityScore]
      properties:
        totalProjects:
          type: integer
        evmCount:
          type: integer
        solanaCount:
          type: integer
        deployedCount:
          type: integer
        averageSecurityScore:
          type: ["number", "null"]
